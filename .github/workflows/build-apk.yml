name: Build armeabi-v7a APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK for armeabi-v7a
      run: |
        # Attempt to build specifically for armeabi-v7a if ABI splits are configured in build.gradle
        if ./gradlew tasks --all | grep -q "assembleArmeabi-v7aRelease"; then
          echo "Building specific ABI split for armeabi-v7a..."
          ./gradlew :app:assembleArmeabi-v7aRelease
        else
          echo "Building standard Release APK with ABI filter..."
          ./gradlew :app:assembleRelease -Pndk.abiFilters=armeabi-v7a
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: armeabi-v7a-apk
        path: |
          app/build/outputs/apk/release/app-armeabi-v7a-release.apk
          app/build/outputs/apk/release/app-release.apk
          app/build/outputs/apk/**/*armeabi-v7a*.apk
